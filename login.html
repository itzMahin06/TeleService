<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>লগইন — মাহিন সার্ভিস</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-logo">
    <div class="brand-mark"><i class="fa-solid fa-shield-halved"></i></div>
    <div class="name">মাহিন সার্ভিস</div>
    <div class="slogan">By Mahin</div>
  </div>

  <div class="card">
    <h2><i class="fa-solid fa-right-to-bracket"></i> লগইন করুন</h2>
    <div class="sub">আপনার ইমেইল ও পাসওয়ার্ড দিয়ে প্রবেশ করুন।</div>

    <div class="error-msg" id="errMsg"></div>
    <div class="ok-msg" id="okMsg"></div>

    <form id="loginForm">
      <div class="field">
        <label>ইমেইল</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label>পাসওয়ার্ড</label>
        <input type="password" id="password" placeholder="আপনার পাসওয়ার্ড" required>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn"><i class="fa-solid fa-right-to-bracket"></i> লগইন করুন</button>
    </form>

    <div class="divider">অথবা</div>
    <button type="button" class="google-btn" id="googleBtn"><i class="fa-brands fa-google"></i> Google দিয়ে লগইন করুন</button>

    <div class="link-line"><a href="#" id="forgotLink">পাসওয়ার্ড ভুলে গেছেন?</a></div>
    <div class="link-line">অ্যাকাউন্ট নেই? <a href="register.html">রেজিস্ট্রেশন করুন</a></div>
  </div>

  <div class="footer-links" style="margin-top:22px;">
    <a href="privacy.html">গোপনীয়তা নীতি</a>
    <a href="refund.html">রিফান্ড নীতি</a>
    <a href="contact.html">যোগাযোগ</a>
  </div>
</div>

<div class="toast" id="toast"><i class="fa-solid fa-circle-check"></i> <span id="toastMsg"></span></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script>
function showErr(msg){ const e=document.getElementById('errMsg'); e.textContent=msg; e.style.display='block'; document.getElementById('okMsg').style.display='none'; }
function hideMsgs(){ document.getElementById('errMsg').style.display='none'; document.getElementById('okMsg').style.display='none'; }

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideMsgs();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> অপেক্ষা করুন...';

  try{
    await window.MahinFirebaseReady;
    await window.auth.signInWithEmailAndPassword(email, password);
    const params = new URLSearchParams(location.search);
    const next = params.get('next');
    location.href = next ? decodeURIComponent(next) : 'index.html';
  }catch(err){
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> লগইন করুন';
    showErr(friendlyError(err));
  }
});

document.getElementById('forgotLink').addEventListener('click', async (e) => {
  e.preventDefault();
  hideMsgs();
  const email = document.getElementById('email').value.trim();
  if(!email){ showErr('আগে ইমেইল ঘরে আপনার ইমেইল লিখুন, তারপর "পাসওয়ার্ড ভুলে গেছেন" চাপুন।'); return; }
  try{
    await window.MahinFirebaseReady;
    await window.auth.sendPasswordResetEmail(email);
    document.getElementById('okMsg').textContent = 'পাসওয়ার্ড রিসেট লিংক ইমেইলে পাঠানো হয়েছে।';
    document.getElementById('okMsg').style.display = 'block';
  }catch(err){
    showErr(friendlyError(err));
  }
});

document.getElementById('googleBtn').addEventListener('click', async () => {
  hideMsgs();
  try{
    await window.signInWithGoogle();
    const params = new URLSearchParams(location.search);
    const next = params.get('next');
    location.href = next ? decodeURIComponent(next) : 'index.html';
  }catch(err){
    showErr(friendlyError(err));
  }
});

function friendlyError(err){
  const code = err && err.code;
  if(code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found') return 'ইমেইল অথবা পাসওয়ার্ড সঠিক নয়।';
  if(code === 'auth/invalid-email') return 'সঠিক ইমেইল ঠিকানা দিন।';
  if(code === 'auth/too-many-requests') return 'অনেকবার চেষ্টা করা হয়েছে, কিছুক্ষণ পর আবার চেষ্টা করুন।';
  if(code === 'auth/popup-closed-by-user') return 'Google পপ-আপ বন্ধ হয়ে গেছে, আবার চেষ্টা করুন।';
  if(code === 'auth/popup-blocked') return 'ব্রাউজার পপ-আপ ব্লক করেছে, পপ-আপ অনুমতি দিয়ে আবার চেষ্টা করুন।';
  return err && err.message ? err.message : 'কিছু একটা সমস্যা হয়েছে, আবার চেষ্টা করুন।';
}
</script>
</body>
</html>
